services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build: ./server
    env_file:
      - ./server/.env.example
    environment:
      MONGO_URI: mongodb://mongodb:27017/penbot
      AI_SERVICE_URL: http://ai-service:8000
      DOCKER_ENV: "true"
    ports:
      - "4000:4000"
    depends_on:
      - mongodb

  ai-service:
    build: ./ai-service
    env_file:
      - ./ai-service/.env.example
    ports:
      - "8000:8000"

  client:
    build: ./client
    env_file:
      - ./client/.env.example
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  mongo_data:
