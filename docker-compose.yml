services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build: ./server
    env_file:
      - ./server/.env.example
    environment:
      MONGO_URI: mongodb://mongodb:27017/penbot
      AI_SERVICE_URL: http://ai-service:8000
      DOCKER_ENV: "true"
    ports:
      - "4000:4000"
    depends_on:
      - mongodb
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  ai-service:
    build:
      context: ./ai-service
      args:
        INSTALL_VISION: "false"
    env_file:
      - ./ai-service/.env.example
    environment:
      ENABLE_TROCR: "false"
      OCR_SPACE_API_KEY: ""
      MAX_PDF_PAGES: "25"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: ""
    env_file:
      - ./client/.env.example
    ports:
      - "5173:5173"
    depends_on:
      - server
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mongo_data:
